<div class="form-container">
  <h2>Course Enrollment Request (Template-Driven)</h2>
  
  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)" novalidate>
    <!-- Student Name -->
    <div class="form-group">
      <label for="studentName">Student Name *</label>
      <input
        type="text"
        id="studentName"
        name="studentName"
        [(ngModel)]="studentName"
        required
        minlength="3"
        #nameCtrl="ngModel"
        placeholder="Enter your full name"
      />
      <div class="error-container" *ngIf="nameCtrl.touched && nameCtrl.errors">
        <span class="error-msg" *ngIf="nameCtrl.errors['required']">Name is required.</span>
        <span class="error-msg" *ngIf="nameCtrl.errors['minlength']">Name must be at least 3 characters.</span>
      </div>
    </div>

    <!-- Student Email -->
    <div class="form-group">
      <label for="studentEmail">Student Email *</label>
      <input
        type="email"
        id="studentEmail"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        required
        email
        #emailCtrl="ngModel"
        placeholder="Enter your email address"
      />
      <div class="error-container" *ngIf="emailCtrl.touched && emailCtrl.errors">
        <span class="error-msg" *ngIf="emailCtrl.errors['required']">Email is required.</span>
        <span class="error-msg" *ngIf="emailCtrl.errors['email']">Please enter a valid email address.</span>
      </div>
    </div>

    <!-- Course ID -->
    <div class="form-group">
      <label for="courseId">Course ID *</label>
      <input
        type="number"
        id="courseId"
        name="courseId"
        [(ngModel)]="courseId"
        required
        #courseCtrl="ngModel"
        placeholder="Enter course ID (e.g., 101)"
      />
      <div class="error-container" *ngIf="courseCtrl.touched && courseCtrl.errors">
        <span class="error-msg" *ngIf="courseCtrl.errors['required']">Course ID is required.</span>
      </div>
    </div>

    <!-- Preferred Semester -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" [(ngModel)]="preferredSemester">
        <option value="Odd">Odd Semester</option>
        <option value="Even">Even Semester</option>
      </select>
    </div>

    <!-- Agree to Terms -->
    <div class="form-group checkbox-group">
      <input
        type="checkbox"
        id="agreeToTerms"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        required
        #termsCtrl="ngModel"
      />
      <label for="agreeToTerms">I agree to the academic terms and conditions *</label>
      <div class="error-container" *ngIf="termsCtrl.touched && !agreeToTerms">
        <span class="error-msg">You must accept the terms.</span>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="onReset(enrollForm)">
        Reset
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="enrollForm.invalid">
        Submit
      </button>
    </div>
  </form>

  <!-- Success Message -->
  <div class="success-banner" *ngIf="submitted && enrollForm.valid">
    <p>Enrollment request submitted successfully!</p>
  </div>
</div>
